<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>健身網頁APP</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">

  <!-- iOS 加主畫面 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="健身APP">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial; }
    html, body { height: 100%; }

	body{
	  margin: 0;
	  background:#0b0b0b;
	  color:#fff;

	  display: grid;
	  place-items: center;     /* ✅ 真正置中 */

	  padding: 16px;
	  box-sizing: border-box;

	  overflow-y: auto;
	}

	.wrap{
	  width: 100%;
	  max-width: 760px;

	  /* ✅ 讓內容可滾動但整體仍置中 */
	  max-height: calc(100dvh - 32px);
	  
	  min-height: 100%;
	  display: flex;
	  flex-direction: column;
	  justify-content: center;
	}
    .card { background:#151515; border-radius: 18px; padding: 16px; margin: 12px 0; border: 1px solid #1f1f1f; }
    .hint { opacity:.78; font-size: 13px; line-height: 1.45; }
    .big { font-size: 22px; font-weight: 900; letter-spacing: .5px; }
    .pill { display:inline-block; padding: 6px 10px; border-radius: 999px; background:#222; margin-right: 8px; font-size: 13px; }

    /* 首頁四大格 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .muscle {
      background: linear-gradient(145deg, #1e1e1e, #111);
      border-radius: 22px;
      padding: 56px 0;
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #2a2a2a;
      user-select: none;
    }
    @media (hover: hover) and (pointer: fine) {
	  .muscle:hover {
		transform: scale(1.03);
		background: linear-gradient(145deg, #2f7cff, #1a5fd0);
	  }
	}
    .muscle:active { transform: scale(0.99); }

    /* 第二層：動作清單 */
    .toprow { display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-items: center; }
    .ghost {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    .ghost:active { transform: scale(0.99); }

    .picked { text-align: right; }
    .list { margin-top: 12px; display: grid; gap: 10px; }
    .item {
      width: 100%;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color: #fff;
      text-align: left;
      font-weight: 800;
      cursor: pointer;
	  font-size: 22px;
	  letter-spacing: 0.5px;
    }
    .item:active { transform: scale(0.99); }
    .subhint { opacity:.72; font-size: 12px; margin-top: 4px; font-weight: 500; }

    /* 小螢幕 */
    @media (max-width: 420px) {
      .muscle { font-size: 26px; padding: 52px 0; }
      .toprow { grid-template-columns: 110px 1fr; }
    }
	.unitBtn{
	  flex:1;
	  padding: 12px;
	  border-radius: 12px;
	  border: 1px solid #2a2a2a;
	  background: #0f0f0f;
	  color:#fff;
	  font-weight: 900;
	}
	.unitBtn.active{
	  background: linear-gradient(145deg, #2f7cff, #1a5fd0);
	  border-color: #2f7cff;
	}

	.keypad{
	  margin-top: 14px;
	  display:grid;
	  grid-template-columns: repeat(4, 1fr);
	  gap: 10px;
	}
	.key{
	  padding: 16px 0;
	  border-radius: 14px;
	  border: 1px solid #2a2a2a;
	  background: #0f0f0f;
	  color:#fff;
	  font-size: 20px;
	  font-weight: 900;
	}
	.key:active{ transform: scale(0.99); }
	.keyFn{ background:#161616; }
	.keyWide{ grid-column: span 2; }
	.keyPrimary{
	  background: linear-gradient(145deg, #2f7cff, #1a5fd0);
	  border-color:#2f7cff;
	}
	/* 避免 iOS 點擊後卡住 focus 造成看起來一直被選到 */
	.muscle:focus,
	.muscle:focus-visible,
	.item:focus,
	.item:focus-visible,
	button:focus,
	button:focus-visible {
	  outline: none;
	}

	/* 讓 iOS 不要亂高亮點擊 */
	* { -webkit-tap-highlight-color: transparent; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="big" id="homeTitle">健身訓練 APP</div>
    </div>

    <!-- 首頁：四大格 -->
    <div id="grid" class="grid">
      <div class="muscle" onclick="go('shoulder')">肩</div>
      <div class="muscle" onclick="go('chest')">胸</div>
      <div class="muscle" onclick="go('legs')">腿</div>
      <div class="muscle" onclick="go('back')">背</div>
    </div>

    <!-- 第二層：動作清單 -->
    <div id="detail" class="card" style="display:none;">
      <div class="toprow">
        <button class="ghost" onclick="backHome()">← 返回</button>
        <div class="picked">
          <div class="hint" id="pickedLine">請選擇一個動作</div>
        </div>
      </div>

      <div id="list" class="list"></div>
      <div class="hint" style="margin-top:12px;">
        小提示：下一步我們可以把「選動作」接到「輸入重量/次數/組數」或「計算槓片」。
      </div>
    </div>
	
	<!-- 第三層：輸入重量（預設隱藏） -->
	<div id="entry" class="card" style="display:none;">
	  <div class="toprow">
		<button class="ghost" onclick="backToList()">← 返回</button>
		<div class="picked">
		  <div class="hint" id="entryTitle">—</div>
		</div>
	  </div>

	  <div style="margin-top:12px; display:grid; gap:10px;">
		<div class="big" id="weightDisplay" style="font-size:34px;">0</div>

		<div style="display:flex; gap:10px;">
		  <button id="unitKg" class="unitBtn active" onclick="setUnit('kg')">公斤 kg</button>
		  <button id="unitLb" class="unitBtn" onclick="setUnit('lb')">磅 lb</button>
		</div>
	  </div>

	  <div class="keypad">
		<button class="key" onclick="k('7')">7</button>
		<button class="key" onclick="k('8')">8</button>
		<button class="key" onclick="k('9')">9</button>
		<button class="key keyFn" onclick="backspace()">⌫</button>

		<button class="key" onclick="k('4')">4</button>
		<button class="key" onclick="k('5')">5</button>
		<button class="key" onclick="k('6')">6</button>
		<button class="key keyFn" onclick="clearAll()">C</button>

		<button class="key" onclick="k('1')">1</button>
		<button class="key" onclick="k('2')">2</button>
		<button class="key" onclick="k('3')">3</button>
		<button class="key keyFn" onclick="k('.')">.</button>

		<button class="key keyWide" onclick="k('0')">0</button>
		<button class="key keyPrimary" onclick="saveOne()">儲存</button>
	  </div>

	  <div class="hint" id="saveHint" style="margin-top:10px;"></div>
	</div>
  </div>

  <script>
    const WORKOUTS = {
      shoulder: {
        title: "肩",
        items: [
          { name: "啞鈴肩推"},
          { name: "啞鈴側平舉"},
          { name: "史密斯肩推"},
          { name: "阿諾肩推"},
          { name: "面拉（Face Pull）"}
        ]
      },
      chest: {
        title: "胸",
        items: [
          { name: "槓鈴臥推"},
          { name: "啞鈴臥推"},
          { name: "上斜啞鈴臥推"},
          { name: "飛鳥"},
          { name: "雙槓撐體"}
        ]
      },
      legs: {
        title: "腿",
        items: [
          { name: "深蹲"},
          { name: "腿推"},
          { name: "腿伸展"},
          { name: "腿後勾"},
          { name: "羅馬尼亞硬舉"}
        ]
      },
      back: {
        title: "背",
        items: [
          { name: "引體向上"},
          { name: "下拉"},
          { name: "坐姿划船"},
          { name: "單臂啞鈴划船"},
          { name: "硬舉"}
        ]
      }
    };

    function go(part) {
      const data = WORKOUTS[part];
      if (!data) return;

      document.getElementById("homeTitle").textContent = `${data.title}｜動作選擇`;

      const list = document.getElementById("list");
      list.innerHTML = data.items.map(x => `
        <button class="item" onclick="pick('${part}', '${escapeJS(x.name)}')">
          ${x.name}
        </button>
      `).join("");

      document.getElementById("pickedLine").textContent = "請選擇一個動作";

      document.getElementById("grid").style.display = "none";
      document.getElementById("detail").style.display = "block";
    }

    function backHome() {
      document.getElementById("homeTitle").textContent = "健身訓練 APP";
      document.getElementById("detail").style.display = "none";
      document.getElementById("grid").style.display = "grid";
	  // 解除 iOS focus，避免返回後卡住反藍
	  if (document.activeElement) document.activeElement.blur();
    }

    function escapeJS(s) {
      return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

	let currentPart = null;
	let currentExercise = null;
	let unit = "kg";
	let inputStr = "0";

	function pick(part, name){
	  currentPart = part;
	  currentExercise = name;

	  document.getElementById("entryTitle").textContent = `已選擇：${WORKOUTS[part].title}｜${name}`;
	  inputStr = "0";
	  renderWeight();

	  // 顯示輸入頁，隱藏清單頁
	  document.getElementById("detail").style.display = "none";
	  document.getElementById("entry").style.display = "block";
	}

	function backToList(){
	  document.getElementById("entry").style.display = "none";
	  document.getElementById("detail").style.display = "block";
	  document.getElementById("saveHint").textContent = "";
	  if (document.activeElement) document.activeElement.blur();
	}

	function setUnit(u){
	  unit = u;
	  document.getElementById("unitKg").classList.toggle("active", unit==="kg");
	  document.getElementById("unitLb").classList.toggle("active", unit==="lb");
	  renderWeight(); // 👈 新增：切換單位立刻同步上方顯示
	}

	function k(ch){
	  if (ch === "."){
		if (inputStr.includes(".")) return;
		inputStr += ".";
		renderWeight();
		return;
	  }
	  if (inputStr === "0") inputStr = ch;
	  else inputStr += ch;
	  renderWeight();
	}

	function backspace(){
	  if (inputStr.length <= 1) inputStr = "0";
	  else inputStr = inputStr.slice(0, -1);
	  if (inputStr === "-" || inputStr === "" ) inputStr = "0";
	  renderWeight();
	}

	function clearAll(){
	  inputStr = "0";
	  renderWeight();
	}

	function renderWeight(){
	  document.getElementById("weightDisplay").textContent = `${inputStr} ${unit}`;
	}

	function saveOne(){
	  // 先只做「顯示已儲存」：下一步再接 localStorage 訓練紀錄
	  document.getElementById("saveHint").textContent =
		`已儲存：${currentExercise}｜${inputStr} ${unit}`;
	}
    // Service Worker（離線/PWA）
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
