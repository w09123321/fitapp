<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>健身網頁APP</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">

  <!-- iOS 加主畫面 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="健身APP">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial; }
    html, body { height: 100%; }

    body{
      margin: 0;
      background:#0b0b0b;
      color:#fff;

      display: grid;
      place-items: center;

      padding: 16px;
      box-sizing: border-box;

      overflow-y: auto;
    }

    .wrap{
      width: 100%;
      max-width: 760px;
      max-height: calc(100dvh - 32px);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card {
      background:#151515;
      border-radius: 18px;
      padding: 16px;
      margin: 12px 0;
      border: 1px solid #1f1f1f;
    }

    .hint { opacity:.78; font-size: 13px; line-height: 1.45; }
    .big { font-size: 22px; font-weight: 900; letter-spacing: .5px; }
    .pill { display:inline-block; padding: 6px 10px; border-radius: 999px; background:#222; margin-right: 8px; font-size: 13px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .muscle {
      background: linear-gradient(145deg, #1e1e1e, #111);
      border-radius: 22px;
      padding: 56px 0;
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #2a2a2a;
      user-select: none;
    }

    @media (hover: hover) and (pointer: fine) {
      .muscle:hover {
        transform: scale(1.03);
        background: linear-gradient(145deg, #2f7cff, #1a5fd0);
      }
    }

    .muscle:active { transform: scale(0.99); }

    .toprow {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      align-items: center;
    }

    .ghost {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
	
	.logoutRow{
	  display: flex;
	  justify-content: flex-end;
	  margin-top: 10px;
	}

	.logoutBtnSmall{
	  width: auto;
	  min-width: 120px;
	  padding: 10px 18px;
	  border-radius: 12px;
	  border: 1px solid #2a2a2a;
	  background: transparent;
	  color: #fff;
	  font-weight: 900;
	  cursor: pointer;
	}

	.logoutBtnSmall:active{
	  transform: scale(0.99);
	}

    .ghost:active { transform: scale(0.99); }

    .picked { text-align: right; }
    .list { margin-top: 12px; display: grid; gap: 10px; }

    .item {
      width: 100%;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color: #fff;
      text-align: left;
      font-weight: 800;
      cursor: pointer;
      font-size: 22px;
      letter-spacing: 0.5px;
    }

    .item:active { transform: scale(0.99); }
    .subhint { opacity:.72; font-size: 12px; margin-top: 4px; font-weight: 500; }

    @media (max-width: 420px) {
      .muscle { font-size: 26px; padding: 52px 0; }
      .toprow { grid-template-columns: 110px 1fr; }
    }

    .unitBtn{
      flex:1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color:#fff;
      font-weight: 900;
    }

    .unitBtn.active{
      background: linear-gradient(145deg, #2f7cff, #1a5fd0);
      border-color: #2f7cff;
    }

    .keypad{
      margin-top: 14px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .key{
      padding: 16px 0;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color:#fff;
      font-size: 20px;
      font-weight: 900;
    }

    .key:active{ transform: scale(0.99); }
    .keyFn{ background:#161616; }
    .keyWide{ grid-column: span 2; }

    .keyPrimary{
      background: linear-gradient(145deg, #2f7cff, #1a5fd0);
      border-color:#2f7cff;
    }

    .remember-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      padding:4px 2px;
      font-size:16px;
      color:#fff;
      user-select:none;
    }

    .remember-wrap input[type="checkbox"]{
      width:24px;
      height:24px;
      accent-color:#2f7cff;
      margin:0;
      flex: 0 0 auto;
    }
	
	.queryArea{
	  margin-top: 18px;
	}

	.queryBtn{
	  width: 100%;
	  padding: 16px 0;
	  border-radius: 18px;
	  border: 1px solid #2a2a2a;
	  background: #151515;
	  color: #fff;
	  font-size: 22px;
	  font-weight: 900;
	  cursor: pointer;
	}

	.queryBtn:active{
	  transform: scale(0.99);
	}

    .muscle:focus,
    .muscle:focus-visible,
    .item:focus,
    .item:focus-visible,
    button:focus,
    button:focus-visible,
    input:focus,
    input:focus-visible {
      outline: none;
    }

    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card" id="userCard">
      <div class="big" id="homeTitle">健身訓練 APP</div>

      <div id="loginBox" style="margin-top:12px; display:grid; gap:10px;">
        <input
          id="emailInput"
          type="email"
          placeholder="輸入 Email"
          autocomplete="username"
          style="width:100%; padding:12px; border-radius:12px; border:1px solid #2a2a2a; background:#0f0f0f; color:#fff; box-sizing:border-box;"
        >

        <input
          id="passwordInput"
          type="password"
          placeholder="輸入密碼"
          autocomplete="current-password"
          style="width:100%; padding:12px; border-radius:12px; border:1px solid #2a2a2a; background:#0f0f0f; color:#fff; box-sizing:border-box;"
        >

        <label id="rememberWrap" class="remember-wrap" for="rememberMe">
          <input id="rememberMe" type="checkbox">
          <span>記住我</span>
        </label>

        <button id="loginBtn" class="ghost" onclick="loginPassword()">登入</button>

        <div id="loginMsg" class="hint"></div>
        <div id="userInfo" class="hint" style="display:none;"></div>
        <div id="logoutWrap" class="logoutRow" style="display:none;">
		  <button id="logoutBtn" class="logoutBtnSmall" onclick="logout()">登出</button>
		</div>
      </div>
    </div>

    <!-- 首頁：四大格 -->
    <div id="appArea" style="display:none;">
      <div id="grid" class="grid">
        <div class="muscle" onclick="go('shoulder')">肩</div>
        <div class="muscle" onclick="go('chest')">胸</div>
        <div class="muscle" onclick="go('legs')">腿</div>
        <div class="muscle" onclick="go('back')">背</div>
      </div>
	  
	  <div class="queryArea">
		<button class="queryBtn" onclick="openHistory()">查詢</button>
	  </div>
    </div>

    <!-- 第二層：動作清單 -->
    <div id="detail" class="card" style="display:none;">
      <div class="toprow">
        <button class="ghost" onclick="backHome()">← 返回</button>
        <div class="picked">
          <div class="hint" id="pickedLine">請選擇一個動作</div>
        </div>
      </div>

      <div id="list" class="list"></div>
    </div>

    <!-- 第三層：輸入重量 -->
    <div id="entry" class="card" style="display:none;">
      <div class="toprow">
        <button class="ghost" onclick="backToList()">← 返回</button>
        <div class="picked">
          <div class="hint" id="entryTitle">—</div>
        </div>
      </div>

      <div style="margin-top:12px; display:grid; gap:10px;">
        <div class="big" id="weightDisplay" style="font-size:34px;">0</div>

        <div style="display:flex; gap:10px;">
          <button id="unitKg" class="unitBtn active" onclick="setUnit('kg')">公斤 kg</button>
          <button id="unitLb" class="unitBtn" onclick="setUnit('lb')">磅 lb</button>
        </div>
      </div>

      <div class="keypad">
        <button class="key" onclick="k('7')">7</button>
        <button class="key" onclick="k('8')">8</button>
        <button class="key" onclick="k('9')">9</button>
        <button class="key keyFn" onclick="backspace()">⌫</button>

        <button class="key" onclick="k('4')">4</button>
        <button class="key" onclick="k('5')">5</button>
        <button class="key" onclick="k('6')">6</button>
        <button class="key keyFn" onclick="clearAll()">C</button>

        <button class="key" onclick="k('1')">1</button>
        <button class="key" onclick="k('2')">2</button>
        <button class="key" onclick="k('3')">3</button>
        <button class="key keyFn" onclick="k('.')">.</button>

        <button class="key keyWide" onclick="k('0')">0</button>
        <button class="key keyPrimary" onclick="saveOne()">儲存</button>
      </div>

      <div class="hint" id="saveHint" style="margin-top:10px;"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

    const supabaseUrl = "https://idkeiylnalrwsplxkybw.supabase.co"
    const supabaseKey = "sb_publishable_7SC9L3N6dxkQDNQpnVHrvw_DNBKpHMQ"
    const supabase = createClient(supabaseUrl, supabaseKey)

    const WORKOUTS = {
      shoulder: {
        title: "肩",
        items: [
          { name: "啞鈴肩推"},
          { name: "啞鈴側平舉"},
          { name: "史密斯肩推"},
          { name: "阿諾肩推"},
          { name: "面拉（Face Pull）"}
        ]
      },
      chest: {
        title: "胸",
        items: [
          { name: "槓鈴臥推"},
          { name: "啞鈴臥推"},
          { name: "上斜啞鈴臥推"},
          { name: "飛鳥"},
          { name: "雙槓撐體"}
        ]
      },
      legs: {
        title: "腿",
        items: [
          { name: "深蹲"},
          { name: "腿推"},
          { name: "腿伸展"},
          { name: "腿後勾"},
          { name: "羅馬尼亞硬舉"}
        ]
      },
      back: {
        title: "背",
        items: [
          { name: "引體向上"},
          { name: "下拉"},
          { name: "坐姿划船"},
          { name: "單臂啞鈴划船"},
          { name: "硬舉"}
        ]
      }
    };

    function go(part) {
      const data = WORKOUTS[part];
      if (!data) return;

      document.getElementById("homeTitle").textContent = `${data.title}｜動作選擇`;

      const list = document.getElementById("list");
      list.innerHTML = data.items.map(x => `
        <button class="item" onclick="pick('${part}', '${escapeJS(x.name)}')">
          ${x.name}
        </button>
      `).join("");

      document.getElementById("pickedLine").textContent = "請選擇一個動作";

      document.getElementById("grid").style.display = "none";
      document.getElementById("detail").style.display = "block";
	  document.getElementById("userCard").style.display = "none";
    }

    function backHome() {
      document.getElementById("homeTitle").textContent = "健身訓練 APP";
      document.getElementById("detail").style.display = "none";
      document.getElementById("grid").style.display = "grid";
	  document.getElementById("userCard").style.display = "block";
      if (document.activeElement) document.activeElement.blur();
    }

    function escapeJS(s) {
      return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    let currentPart = null;
    let currentExercise = null;
    let unit = "kg";
    let inputStr = "0";

    function pick(part, name){
      currentPart = part;
      currentExercise = name;

      document.getElementById("entryTitle").textContent = `已選擇：${WORKOUTS[part].title}｜${name}`;
      inputStr = "0";
      renderWeight();

      document.getElementById("detail").style.display = "none";
      document.getElementById("entry").style.display = "block";
	  document.getElementById("userCard").style.display = "none";
    }

    function backToList(){
      document.getElementById("entry").style.display = "none";
      document.getElementById("detail").style.display = "block";
	  document.getElementById("userCard").style.display = "none";
      document.getElementById("saveHint").textContent = "";
      if (document.activeElement) document.activeElement.blur();
    }

    function setUnit(u){
      unit = u;
      document.getElementById("unitKg").classList.toggle("active", unit==="kg");
      document.getElementById("unitLb").classList.toggle("active", unit==="lb");
      renderWeight();
    }

    function k(ch){
      if (ch === "."){
        if (inputStr.includes(".")) return;
        inputStr += ".";
        renderWeight();
        return;
      }
      if (inputStr === "0") inputStr = ch;
      else inputStr += ch;
      renderWeight();
    }

    function backspace(){
      if (inputStr.length <= 1) inputStr = "0";
      else inputStr = inputStr.slice(0, -1);
      if (inputStr === "-" || inputStr === "" ) inputStr = "0";
      renderWeight();
    }

    function clearAll(){
      inputStr = "0";
      renderWeight();
    }

    function renderWeight(){
      document.getElementById("weightDisplay").textContent = `${inputStr} ${unit}`;
    }

    async function saveOne(){
      const { data: { user } } = await supabase.auth.getUser();

      if(!user){
        document.getElementById("saveHint").textContent = "請先登入";
        return;
      }

      const { error } = await supabase
        .from("workouts")
        .insert([
          {
            user_id: user.id,
            note: `${currentExercise} ${inputStr} ${unit}`
          }
        ]);

      if(error){
        document.getElementById("saveHint").textContent = "儲存失敗";
      }else{
        document.getElementById("saveHint").textContent =
          `已儲存：${currentExercise}｜${inputStr} ${unit}`;
      }
    }

    function setLoginMsg(text){
      document.getElementById("loginMsg").textContent = text;
    }

    function saveRememberMe(email, password, checked){
      if(checked){
        localStorage.setItem("remember_email", email);
        localStorage.setItem("remember_password", password);
        localStorage.setItem("remember_me", "true");
      }else{
        localStorage.removeItem("remember_email");
        localStorage.removeItem("remember_password");
        localStorage.removeItem("remember_me");
      }
    }

    function loadRememberMe(){
      const remembered = localStorage.getItem("remember_me") === "true";
      const email = localStorage.getItem("remember_email") || "";
      const password = localStorage.getItem("remember_password") || "";

      const emailInput = document.getElementById("emailInput");
      const passwordInput = document.getElementById("passwordInput");
      const rememberMe = document.getElementById("rememberMe");

      if(emailInput) emailInput.value = email;
      if(passwordInput) passwordInput.value = password;
      if(rememberMe) rememberMe.checked = remembered;
    }

    async function loginPassword(){
      const email = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passwordInput").value.trim();
      const rememberMe = document.getElementById("rememberMe").checked;

      if(!email || !password){
        setLoginMsg("請輸入 Email 和密碼");
        return;
      }

      setLoginMsg("登入中...");

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if(error){
        setLoginMsg("登入失敗：帳號不存在或密碼錯誤");
      }else{
        saveRememberMe(email, password, rememberMe);
        setLoginMsg("✅ 登入成功");
      }
    }

    async function logout(){
      const { error } = await supabase.auth.signOut();

      if(error){
        setLoginMsg("登出失敗：" + error.message);
        return;
      }

      updateAuthUI(null);
      setLoginMsg("已登出");
    }

    function updateAuthUI(user){
      const emailInput = document.getElementById("emailInput");
      const passwordInput = document.getElementById("passwordInput");
      const rememberWrap = document.getElementById("rememberWrap");
      const loginBtn = document.getElementById("loginBtn");
      const userInfo = document.getElementById("userInfo");
      const logoutWrap = document.getElementById("logoutWrap");
      const appArea = document.getElementById("appArea");

      if(user){
        emailInput.style.display = "none";
        passwordInput.style.display = "none";
        rememberWrap.style.display = "none";
        loginBtn.style.display = "none";
        userInfo.style.display = "block";
        logoutWrap.style.display = "flex";
        appArea.style.display = "block";

        userInfo.textContent = `目前登入：${user.email}`;
        setLoginMsg("");
      }else{
        emailInput.style.display = "block";
        passwordInput.style.display = "block";
        rememberWrap.style.display = "flex";
        loginBtn.style.display = "block";
        userInfo.style.display = "none";
        logoutWrap.style.display = "none";
        appArea.style.display = "none";

        userInfo.textContent = "";
      }
    }
	
	function openHistory(){
	  alert("之後這裡會開啟查詢頁面");
	}

    async function checkLogin(){
      const { data, error } = await supabase.auth.getUser();

      if(error || !data.user){
        updateAuthUI(null);
        return;
      }

      updateAuthUI(data.user);
    }

    window.go = go;
    window.backHome = backHome;
    window.pick = pick;
    window.backToList = backToList;
    window.setUnit = setUnit;
    window.k = k;
    window.backspace = backspace;
    window.clearAll = clearAll;
    window.saveOne = saveOne;
    window.logout = logout;
    window.checkLogin = checkLogin;
    window.loginPassword = loginPassword;
	window.openHistory = openHistory;

    supabase.auth.onAuthStateChange((_event, session) => {
      updateAuthUI(session?.user ?? null);
    });

    loadRememberMe();
    checkLogin();
  </script>
</body>
</html>
