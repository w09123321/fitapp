<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>健身網頁APP</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">

  <!-- iOS 加主畫面 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="健身APP">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial; }
    body { margin: 0; background:#0b0b0b; color:#fff; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
    .card { background:#151515; border-radius: 16px; padding: 16px; margin: 12px 0; }
    label { display:block; margin: 10px 0 6px; opacity: .9; }
    input, select, button { width:100%; padding: 12px; border-radius: 12px; border: 1px solid #2a2a2a; background:#0f0f0f; color:#fff; }
    button { border: none; background:#2f7cff; font-weight: 700; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hint { opacity:.75; font-size: 13px; line-height: 1.4; }
    .big { font-size: 20px; font-weight: 800; }
    .pill { display:inline-block; padding: 6px 10px; border-radius: 999px; background:#222; margin-right: 8px; font-size: 13px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="big">健身網頁版 APP（PWA）</div>
      <div class="hint">iPhone：用 Safari 開啟後 → 分享 →「加入主畫面」就會出現桌面圖示。</div>
    </div>

    <div class="card">
      <div class="pill">功能 1</div><span class="big">一RM & 訓練重量</span>
      <label>重量（kg）</label>
      <input id="w" type="number" inputmode="decimal" value="80" />
      <label>次數（reps）</label>
      <input id="r" type="number" inputmode="numeric" value="5" />
      <label>公式</label>
      <select id="formula">
        <option value="epley">Epley：1RM = w × (1 + reps/30)</option>
        <option value="brzycki">Brzycki：1RM = w × 36 / (37 - reps)</option>
      </select>

      <div style="margin-top:12px" class="row">
        <button onclick="calc()">計算</button>
        <button onclick="save()">存到本機紀錄</button>
      </div>

      <div id="out" style="margin-top:12px" class="hint"></div>
    </div>

    <div class="card">
      <div class="pill">功能 2</div><span class="big">本機訓練紀錄</span>
      <div class="hint">存在手機本機（localStorage），不用登入也能用。</div>
      <div style="margin-top:12px" class="row">
        <button onclick="renderLog()">刷新列表</button>
        <button onclick="clearLog()">清空紀錄</button>
      </div>
      <div id="log" style="margin-top:12px"></div>
    </div>
  </div>

  <script>
    function oneRM(w, r, f){
      if (r <= 0) return 0;
      if (f === "brzycki"){
        if (r >= 37) return NaN;
        return w * 36 / (37 - r);
      }
      // epley default
      return w * (1 + r/30);
    }

    function round1(x){ return Math.round(x*10)/10; }

    function calc(){
      const w = parseFloat(document.getElementById("w").value || "0");
      const r = parseInt(document.getElementById("r").value || "0", 10);
      const f = document.getElementById("formula").value;

      const rm = oneRM(w, r, f);
      if (!isFinite(rm) || rm <= 0){
        document.getElementById("out").innerHTML = "數值怪怪的，檢查一下重量/次數。";
        return;
      }

      // 常見訓練區間：70%~85% 估算
      const p70 = round1(rm * 0.70);
      const p80 = round1(rm * 0.80);
      const p85 = round1(rm * 0.85);

      document.getElementById("out").innerHTML =
        `估算 1RM：<b>${round1(rm)}</b> kg<br>` +
        `建議訓練重量：70% ≈ <b>${p70}</b> / 80% ≈ <b>${p80}</b> / 85% ≈ <b>${p85}</b> kg`;
    }

    function loadAll(){
      return JSON.parse(localStorage.getItem("fitapp_log") || "[]");
    }
    function saveAll(list){
      localStorage.setItem("fitapp_log", JSON.stringify(list));
    }

    function save(){
      const w = parseFloat(document.getElementById("w").value || "0");
      const r = parseInt(document.getElementById("r").value || "0", 10);
      const f = document.getElementById("formula").value;
      const rm = oneRM(w, r, f);
      if (!isFinite(rm) || rm <= 0) return calc();

      const list = loadAll();
      list.unshift({
        ts: new Date().toISOString(),
        w, r, f,
        rm: round1(rm)
      });
      saveAll(list);
      renderLog();
      document.getElementById("out").innerHTML += "<br>✅ 已存到本機紀錄";
    }

    function renderLog(){
      const list = loadAll();
      const el = document.getElementById("log");
      if (!list.length){
        el.innerHTML = "<div class='hint'>目前沒有紀錄。</div>";
        return;
      }
      el.innerHTML = list.slice(0, 30).map(item => {
        const d = new Date(item.ts);
        const t = d.toLocaleString();
        return `<div class="card" style="background:#101010">
          <div><b>${t}</b></div>
          <div class="hint">重量 ${item.w}kg × ${item.r} reps（${item.f}）→ 1RM ${item.rm}kg</div>
        </div>`;
      }).join("");
    }

    function clearLog(){
      localStorage.removeItem("fitapp_log");
      renderLog();
    }

    // Service Worker（離線）
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }

    calc();
    renderLog();
  </script>
</body>
</html>
