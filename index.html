<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>健身網頁APP</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">

  <!-- iOS 加主畫面 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="健身APP">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial; }
    html, body { height: 100%; }

	body {
	  margin: 0;
	  background: #0b0b0b;
	  color: #fff;

	  display: grid;
	  place-items: start center;
	  padding-top: 80px;
	  padding-left: 16px;
	  padding-right: 16px;
	  box-sizing: border-box;
	}
    .wrap {
	  max-width: 760px;
	  width: 100%;
	  margin: 0;        /* 原本可能是 margin:0 auto; 這裡改成 0 */
	  padding: 0;       /* body 已經有 padding */
	}
    .card { background:#151515; border-radius: 18px; padding: 16px; margin: 12px 0; border: 1px solid #1f1f1f; }
    .hint { opacity:.78; font-size: 13px; line-height: 1.45; }
    .big { font-size: 22px; font-weight: 900; letter-spacing: .5px; }
    .pill { display:inline-block; padding: 6px 10px; border-radius: 999px; background:#222; margin-right: 8px; font-size: 13px; }

    /* 首頁四大格 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .muscle {
      background: linear-gradient(145deg, #1e1e1e, #111);
      border-radius: 22px;
      padding: 56px 0;
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #2a2a2a;
      user-select: none;
    }
    .muscle:hover { transform: scale(1.03); background: linear-gradient(145deg, #2f7cff, #1a5fd0); }
    .muscle:active { transform: scale(0.99); }

    /* 第二層：動作清單 */
    .toprow { display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-items: center; }
    .ghost {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    .ghost:active { transform: scale(0.99); }

    .picked { text-align: right; }
    .list { margin-top: 12px; display: grid; gap: 10px; }
    .item {
      width: 100%;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color: #fff;
      text-align: left;
      font-weight: 800;
      cursor: pointer;
    }
    .item:active { transform: scale(0.99); }
    .subhint { opacity:.72; font-size: 12px; margin-top: 4px; font-weight: 500; }

    /* 小螢幕 */
    @media (max-width: 420px) {
      .muscle { font-size: 26px; padding: 52px 0; }
      .toprow { grid-template-columns: 110px 1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="big" id="homeTitle">健身訓練 APP</div>
      <div class="hint" id="homeHint">選擇今天要練的部位</div>
    </div>

    <!-- 首頁：四大格 -->
    <div id="grid" class="grid">
      <div class="muscle" onclick="go('shoulder')">肩</div>
      <div class="muscle" onclick="go('chest')">胸</div>
      <div class="muscle" onclick="go('legs')">腿</div>
      <div class="muscle" onclick="go('back')">背</div>
    </div>

    <!-- 第二層：動作清單 -->
    <div id="detail" class="card" style="display:none;">
      <div class="toprow">
        <button class="ghost" onclick="backHome()">← 返回</button>
        <div class="picked">
          <div class="hint" id="pickedLine">請選擇一個動作</div>
        </div>
      </div>

      <div id="list" class="list"></div>
      <div class="hint" style="margin-top:12px;">
        小提示：下一步我們可以把「選動作」接到「輸入重量/次數/組數」或「計算槓片」。
      </div>
    </div>
  </div>

  <script>
    const WORKOUTS = {
      shoulder: {
        title: "肩",
        items: [
          { name: "啞鈴肩推", note: "前三角為主，穩定核心" },
          { name: "啞鈴側平舉", note: "中三角，控制離心" },
          { name: "史密斯肩推", note: "較穩定，可做漸進加重" },
          { name: "阿諾肩推", note: "活動度 + 肩整體" },
          { name: "面拉（Face Pull）", note: "後三角 + 肩胛穩定" }
        ]
      },
      chest: {
        title: "胸",
        items: [
          { name: "槓鈴臥推", note: "主力動作，注意肩胛後收" },
          { name: "啞鈴臥推", note: "活動度更大，控制下放" },
          { name: "上斜啞鈴臥推", note: "上胸偏重" },
          { name: "飛鳥", note: "感受伸展，別硬鎖肘" },
          { name: "雙槓撐體", note: "下胸刺激，量力而為" }
        ]
      },
      legs: {
        title: "腿",
        items: [
          { name: "深蹲", note: "全腿＋核心，注意姿勢" },
          { name: "腿推", note: "可堆量，膝蓋跟腳尖方向一致" },
          { name: "腿伸展", note: "股四頭隔離，控制離心" },
          { name: "腿後勾", note: "腿後側隔離" },
          { name: "羅馬尼亞硬舉", note: "腿後＋臀，髖折" }
        ]
      },
      back: {
        title: "背",
        items: [
          { name: "引體向上", note: "背闊＋手臂，先練動作感" },
          { name: "下拉", note: "先把肩胛下壓再拉" },
          { name: "坐姿划船", note: "中背厚度，避免聳肩" },
          { name: "單臂啞鈴划船", note: "左右差異修正很棒" },
          { name: "硬舉", note: "全身後鏈，注意腰背穩定" }
        ]
      }
    };

    function go(part) {
      const data = WORKOUTS[part];
      if (!data) return;

      document.getElementById("homeTitle").textContent = `${data.title}｜動作選擇`;
      document.getElementById("homeHint").textContent = "選一個動作開始訓練";

      const list = document.getElementById("list");
      list.innerHTML = data.items.map(x => `
        <button class="item" onclick="pick('${part}', '${escapeJS(x.name)}')">
          ${x.name}
          <div class="subhint">${x.note ?? ""}</div>
        </button>
      `).join("");

      document.getElementById("pickedLine").textContent = "請選擇一個動作";

      document.getElementById("grid").style.display = "none";
      document.getElementById("detail").style.display = "block";
    }

    function backHome() {
      document.getElementById("homeTitle").textContent = "健身訓練 APP";
      document.getElementById("homeHint").textContent = "選擇今天要練的部位";
      document.getElementById("detail").style.display = "none";
      document.getElementById("grid").style.display = "grid";
    }

    function pick(part, name) {
      const title = WORKOUTS[part]?.title ?? "";
      document.getElementById("pickedLine").textContent = `已選擇：${title}｜${name}`;
      // 下一步：你要加「記錄重量/次數/組數」就從這裡延伸
    }

    function escapeJS(s) {
      return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    // Service Worker（離線/PWA）
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
